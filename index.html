<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Kanban | Professional Ledger</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --border: #000000;
            --accent: #f0f0f0;
            --success: #2ecc71;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* Stats & Timer Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .stats { display: flex; gap: 15px; }
        .stat-box {
            border: 2px solid var(--border);
            padding: 5px 15px;
            text-align: center;
            min-width: 80px;
        }
        .stat-val { font-size: 18px; font-weight: 800; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .timer-display {
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid var(--border);
            padding: 5px 20px;
            background: var(--accent);
        }

        /* Kanban Layout */
        .kanban {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            flex-grow: 1;
        }

        .column {
            background: var(--accent);
            border: 2px solid var(--border);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .column h3 {
            margin-top: 0;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .card-list { flex-grow: 1; overflow-y: auto; }

        /* Cards */
        .card {
            background: white;
            border: 2px solid var(--border);
            padding: 12px;
            margin-bottom: 15px;
            box-shadow: 4px 4px 0px var(--border);
            transition: 0.1s;
        }

        .card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--border); }
        .tag { font-size: 9px; font-weight: bold; text-transform: uppercase; background: #000; color: #fff; padding: 2px 6px; margin-bottom: 8px; display: inline-block; }
        .card-title { font-weight: 700; font-size: 14px; display: block; margin-bottom: 5px; }
        .card-note { font-size: 12px; color: #444; margin-bottom: 10px; line-height: 1.4; }

        .card-btns { display: flex; gap: 5px; border-top: 1px solid #ddd; padding-top: 10px; }
        .btn-small { border: 1px solid #000; background: #fff; font-size: 10px; cursor: pointer; padding: 3px 8px; font-weight: bold; }
        .btn-small:hover { background: #000; color: #fff; }

        /* Controls */
        .btn-add {
            width: 100%;
            border: 2px dashed var(--border);
            background: transparent;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal {
            background: #fff; border: 4px solid #000; padding: 25px; width: 350px;
            display: flex; flex-direction: column; gap: 12px;
        }
        input, textarea, select { padding: 10px; border: 1px solid #000; font-family: inherit; }
        .btn-save { background: #000; color: #fff; border: none; padding: 12px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 20px; font-weight: 900; letter-spacing: -1px;">SYSTEMS.LOG</div>
        
        <div class="timer-display" id="timer">25:00</div>
        
        <div class="stats">
            <div class="stat-box"><div class="stat-val" id="stat-todo">0</div><div class="stat-label">Backlog</div></div>
            <div class="stat-box"><div class="stat-val" id="stat-done">0</div><div class="stat-label">Cleared</div></div>
        </div>
    </div>

    <div class="kanban">
        <div class="column">
            <h3>Backlog</h3>
            <div class="card-list" id="list-todo"></div>
            <button class="btn-add" onclick="showModal()">+ NEW ENTRY</button>
        </div>
        <div class="column">
            <h3>Active</h3>
            <div class="card-list" id="list-wip"></div>
        </div>
        <div class="column">
            <h3>Archived</h3>
            <div class="card-list" id="list-done"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal" onclick="if(event.target==this) hideModal()">
        <div class="modal">
            <h2 style="margin:0; font-size: 16px;">ETCH NEW TASK</h2>
            <input type="text" id="inp-title" placeholder="System Name (e.g. QuickBooks Automation)">
            <textarea id="inp-note" placeholder="Logic or Notes..."></textarea>
            <select id="inp-cat">
                <option value="Accounting">📒 Accounting</option>
                <option value="Automation">🤖 Automation</option>
                <option value="Research">📚 Research</option>
            </select>
            <button class="btn-save" onclick="saveTask()">SAVE TO LEDGER</button>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('kanban_data')) || [];
        
        function showModal() { document.getElementById('modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('modal').style.display = 'none'; }

        function saveTask() {
            const title = document.getElementById('inp-title').value;
            if(!title) return;
            const task = {
                id: Date.now(),
                title,
                note: document.getElementById('inp-note').value,
                cat: document.getElementById('inp-cat').value,
                col: 'todo'
            };
            tasks.push(task);
            update();
            hideModal();
            document.getElementById('inp-title').value = '';
            document.getElementById('inp-note').value = '';
        }

        function move(id, newCol) {
            const task = tasks.find(t => t.id === id);
            if(task) task.col = newCol;
            update();
        }

        function remove(id) {
            tasks = tasks.filter(t => t.id !== id);
            update();
        }

        function update() {
            localStorage.setItem('kanban_data', JSON.stringify(tasks));
            ['todo', 'wip', 'done'].forEach(col => {
                const list = document.getElementById(`list-${col}`);
                list.innerHTML = '';
                tasks.filter(t => t.col === col).forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="tag">${t.cat}</div>
                        <span class="card-title">${t.title}</span>
                        <div class="card-note">${t.note}</div>
                        <div class="card-btns">
                            ${t.col === 'todo' ? `<button class="btn-small" onclick="move(${t.id}, 'wip')">START</button>` : ''}
                            ${t.col === 'wip' ? `<button class="btn-small" onclick="move(${t.id}, 'done')">FINISH</button>` : ''}
                            <button class="btn-small" style="color:red" onclick="remove(${t.id})">DEL</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
            document.getElementById('stat-todo').innerText = tasks.filter(t => t.col === 'todo').length;
            document.getElementById('stat-done').innerText = tasks.filter(t => t.col === 'done').length;
        }

        // Simple 25m Timer
        let timeLeft = 1500;
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
        }, 1000);

        update();
    </script>
</body>
</html>
